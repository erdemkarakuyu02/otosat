<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otosat.org | Hayalindeki Aracı Bul</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <a href="index.html" class="logo">Otosat.org</a>
        <nav id="main-nav">
            <a href="giris.html" class="nav-link">Giriş Yap</a>
            <a href="kayit.html" class="nav-link">Kayıt Ol</a>
            <a href="giris.html" class="btn-primary" style="margin-left:10px;">İlan Ver</a>
        </nav>
    </header>

    <div class="content-wrapper">
        
        <section class="hero-section">
            <h1 class="hero-title">Hayalindeki Aracı Bul</h1>
            
            <div class="tab-container">
                <button class="type-tab active" data-type="all">Tümü</button>
                <button class="type-tab" data-type="Satılık">Satılık</button>
                <button class="type-tab" data-type="Kiralık">Kiralık</button>
            </div>

            <div class="search-box">
                <input type="text" placeholder="Kelime, marka veya araç modeli yazın...">
                <button class="btn-primary btn-search">Hemen Ara</button>
            </div>
        </section>

        <div style="display: flex; gap: 25px; flex-wrap: wrap;">
            
            <aside class="sidebar-filter">
                <h3 class="sidebar-title">Detaylı Filtre</h3>
                
                <select id="filter-type" style="display:none;"><option value="all">Tümü</option><option value="Satılık">Satılık</option><option value="Kiralık">Kiralık</option></select>
                
                <div class="filter-group" style="margin-bottom: 18px;">
                    <label>Kategori</label>
                    <select id="filter-category"><option value="all">Tüm Kategoriler</option></select>
                </div>
                
                <div class="filter-group" style="margin-bottom: 18px;">
                    <label>Marka</label>
                    <select id="filter-brand"><option value="all">Tüm Markalar</option></select>
                </div>
                
                <button id="filter-button" class="btn-primary" style="width: 100%; margin-top: 10px; background:#454f5b;">Sonuçları Göster</button>
            </aside>

            <main style="flex: 3; min-width: 300px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 style="color:#1a1c20; font-size:22px; font-weight:700;">Güncel İlanlar Vitrini</h2>
                </div>
                
                <div class="listing-grid" id="car-listings">
                    </div>
            </main>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
