<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap | Otosat.org</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar"><a href="index.html" class="logo">Otosat.org</a><nav></nav></header>
    <div class="auth-wrapper">
        <h2 style="color: #e53935; margin-bottom: 25px;">Oturum Aç</h2>
        <form id="login-form">
            <div class="filter-group"><label>E-Posta Adresi</label><input type="email" required></div>
            <div class="filter-group" style="margin-top: 15px;">
                <label>Şifre <a href="#" id="forgot-password" style="float:right; color:#2196F3; font-weight:normal;">Şifremi Unuttum</a></label>
                <input type="password" required>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 20px; padding: 12px;">Giriş Yap</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
