<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Paneli | Otosat.org</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar"><a href="index.html" class="logo">Otosat.org <span style="font-size: 14px; color: #919eab;">/ Admin</span></a><nav id="main-nav"></nav></header>
    <div class="admin-wrapper">
        
        <h2 style="margin-top:20px; border-bottom:2px solid #2196F3; padding-bottom:10px;">📢 Kullanıcılara Bildirim Gönder</h2>
        <div style="background:#f9f9f9; padding:20px; border-radius:8px; margin-bottom:40px; border:1px solid #ddd;">
            <div class="filter-group">
                <label>Kime Gönderilecek?</label>
                <select id="admin-notif-type" onchange="document.getElementById('notif-email-box').style.display = this.value === 'specific' ? 'block' : 'none'">
                    <option value="all">Herkese (Tüm Kullanıcılara)</option>
                    <option value="specific">Belirli Bir Kullanıcıya</option>
                </select>
            </div>
            <div class="filter-group" id="notif-email-box" style="display:none; margin-top:10px;">
                <label>Kullanıcı E-Posta Adresi</label><input type="email" id="admin-notif-email" placeholder="Örn: ahmet@gmail.com">
            </div>
            <div class="filter-group" style="margin-top:10px;">
                <label>Bildirim Mesajı</label><textarea id="admin-notif-msg" rows="3" placeholder="Gönderilecek duyuruyu veya mesajı yazın..."></textarea>
            </div>
            <button id="send-notif-btn" class="btn-primary" style="margin-top:15px; width:100%; background:#2196F3;">Bildirimi Fırlat</button>
        </div>

        <h2 style="border-bottom:2px solid #9c27b0; padding-bottom:10px;">👥 Sistemde Kayıtlı Tüm Kullanıcılar</h2>
        <div style="overflow-x: auto;">
            <table class="admin-table" style="margin-bottom: 40px;">
                <thead><tr><th>Adı Soyadı</th><th>E-Posta Adresi</th><th>İşlem</th></tr></thead>
                <tbody id="admin-users-body"><tr><td colspan="3" style="text-align:center; color:#888;">Yükleniyor...</td></tr></tbody>
            </table>
        </div>

        <h2 style="border-bottom:2px solid #e53935; padding-bottom:10px;">⏳ Onay Bekleyen İlanlar</h2>
        <div style="overflow-x: auto;">
            <table class="admin-table" style="margin-bottom: 40px;">
                <thead><tr><th>Görsel</th><th>Başlık / Sahibi</th><th>Araç Bilgisi</th><th>İletişim</th><th>İşlem</th></tr></thead>
                <tbody id="admin-listings-body"></tbody>
            </table>
        </div>

        <h2 style="margin-top:50px; border-bottom:2px solid #4CAF50; padding-bottom:10px;">✅ Yayındaki İlanları Yönet</h2>
        <div style="overflow-x: auto;">
            <table class="admin-table">
                <thead><tr><th>Görsel</th><th>Başlık</th><th>Sahibi</th><th>Fiyat</th><th>İşlem</th></tr></thead>
                <tbody id="admin-approved-body"></tbody>
            </table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
